<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Euler's Golden Pie</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="hero">
    <img src="assets/logo.png" alt="EGP Logo" class="logo" />
    <h1>Euler’s Golden Pie</h1>
    <p class="subtitle">
      Explore how each number connects to its three peg images.
    </p>
  </header>

  <nav class="top-nav">
    <div class="nav-center">
      <input
        type="number"
        id="cardSearch"
        min="1"
        max="31"
        placeholder="Jump to card (1–31)"
      />
      <button id="searchBtn">Go</button>
    </div>
  </nav>

  <main class="container">
    <section>
      <h2>Core Pegs</h2>
      <div id="section-1" class="card-grid"></div>
    </section>

    <section>
      <h2>Tens Pegs</h2>
      <div id="section-2" class="card-grid"></div>
    </section>

    <section>
      <h2>Mirror Pegs</h2>
      <div id="section-3" class="card-grid"></div>
    </section>

    <section>
      <h2>Special Pegs</h2>
      <div id="section-4" class="card-grid"></div>
    </section>
  </main>

  <div id="cardModal" class="modal hidden">
    <div class="modal-content">
      <button class="close-btn" id="closeModal" aria-label="Close modal">&times;</button>
      <img id="modalImage" src="" alt="Peg Card Full View" />
      <h3 id="modalTitle"></h3>
      <p id="modalDescription"></p>

      <div class="modal-nav">
        <button id="prevCardBtn">← Previous</button>
        <button id="nextCardBtn">Next →</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
